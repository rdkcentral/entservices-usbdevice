name: Build USBDevice Component in Native Environment

on:
  push:
    branches: [ main, 'sprint/**', 'release/**', develop, topic/RDKEMW-13481 ]
  pull_request:
    branches: [ main, 'sprint/**', 'release/**', topic/RDK*, develop ]

jobs:
  build-usbdevice-on-pr:
    name: Build entservices-usbdevice component in github rdkcentral
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rdkcentral/docker-rdk-ci:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: native build
        run: |
          # Trust the workspace
          git config --global --add safe.directory '*'
          # Pull the latest changes for the native build system
          git submodule update --init --recursive --remote
          # Clone entservices-testframework (requires token)
          mkdir -p $HOME/build
          git clone --branch main https://$GITHUB_TOKEN@github.com/rdkcentral/entservices-testframework.git $HOME/build/entservices-testframework
          # Verify clone and copy testframework headers and patches
          ls -la $HOME/build/entservices-testframework/Tests/ || echo "Tests directory not found"
          mkdir -p $HOME/usr/include/rdkb/testframework
          if [ -d "$HOME/build/entservices-testframework/Tests/headers" ]; then
            cp -R $HOME/build/entservices-testframework/Tests/headers $HOME/usr/include/rdkb/testframework/
          fi
          if [ -d "$HOME/build/entservices-testframework/Tests/mocks" ]; then
            cp -R $HOME/build/entservices-testframework/Tests/mocks $HOME/usr/include/rdkb/testframework/
          fi
          if [ -d "$HOME/build/entservices-testframework/patches" ]; then
            cp -R $HOME/build/entservices-testframework/patches $HOME/usr/include/rdkb/testframework/
          fi
          # Clone ThunderTools and Thunder first, then apply patches
          cd $HOME/build
          git clone --branch R4.4.3 https://github.com/rdkcentral/ThunderTools.git
          git clone --branch R4.4.1 https://github.com/rdkcentral/Thunder.git
          # Apply patches to ThunderTools
          cd ThunderTools
          patch -p1 < $HOME/usr/include/rdkb/testframework/patches/00010-R4.4-Add-support-for-project-dir.patch
          # Apply patches to Thunder
          cd ../Thunder
          patch -p1 < $HOME/usr/include/rdkb/testframework/patches/Use_Legact_Alt_Based_On_ThunderTools_R4.4.3.patch
          patch -p1 < $HOME/usr/include/rdkb/testframework/patches/error_code_R4_4.patch
          patch -p1 < $HOME/usr/include/rdkb/testframework/patches/1004-Add-support-for-project-dir.patch
          patch -p1 < $HOME/usr/include/rdkb/testframework/patches/RDKEMW-733-Add-ENTOS-IDS.patch
          patch -p1 < $HOME/usr/include/rdkb/testframework/patches/Jsonrpc_dynamic_error_handling.patch
          cd $GITHUB_WORKSPACE
          # Build and install dependencies (skip cloning ThunderTools and Thunder since we already did it)
          chmod +x build_tools_workflows/cov_docker_script/setup_dependencies.sh
          ./build_tools_workflows/cov_docker_script/setup_dependencies.sh ./cov_docker_script/component_config.json
          # Build component
          chmod +x build_tools_workflows/cov_docker_script/build_native.sh
          ./build_tools_workflows/cov_docker_script/build_native.sh ./cov_docker_script/component_config.json "$(pwd)"
        env:
          GITHUB_TOKEN: ${{ secrets.RDKCM_RDKE }}
